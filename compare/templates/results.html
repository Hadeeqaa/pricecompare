{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bestprice.com — results</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #fde8f0;
      font-family: 'Fredoka One', cursive;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }

    .page {
      width: 420px;
      height: 860px;
      background: #f5c6d8;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(#e8a0bc 1px, transparent 1px),
        linear-gradient(90deg, #e8a0bc 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      background: #a8ddd0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: #5a3e6b;
      letter-spacing: 1px;
    }

    .win-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot-r {
      background: #f4a0a0;
    }

    .dot-y {
      background: #f4d48a;
    }

    .dot-g {
      background: #a8ddb5;
    }

    .searchbar {
      display: flex;
      align-items: center;
      margin: 14px 14px 10px;
      background: white;
      border: 3px solid #5a3e6b;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }

    .searchbar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 11px 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      color: #7a5080;
      background: transparent;
    }

    .searchbar input::placeholder {
      color: #c4a0c4;
    }

    .searchbar button {
      background: #7a5080;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      color: white;
      font-size: 18px;
    }

    .searchbar button:hover {
      background: #5a3060;
    }

    .result-label {
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      color: #7a5080;
      padding: 0 14px 8px;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      font-weight: 400;
    }

    /* scroll area */
    .scroll-area-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 4px 10px 14px;
      z-index: 3;
    }

    .cards-scroll {
      height: 100%;
      overflow-y: scroll;
      padding-right: 24px;
      padding-bottom: 20px;
      scrollbar-width: none;
    }

    .cards-scroll::-webkit-scrollbar {
      display: none;
    }

    /* custom scrollbar */
    .custom-scrollbar {
      position: absolute;
      right: 2px;
      top: 0;
      bottom: 0;
      width: 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 5;
    }

    .sb-arrow {
      width: 16px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      background: #b098c8;
      border-radius: 3px;
      border: none;
      padding: 0;
      color: white;
      font-size: 9px;
    }

    .sb-arrow:hover {
      background: #9060a8;
    }

    .sb-track {
      flex: 1;
      background: #d4b8d8;
      border-radius: 6px;
      position: relative;
      cursor: pointer;
    }

    .sb-thumb {
      position: absolute;
      left: 0;
      width: 100%;
      background: #9b7ec8;
      border-radius: 6px;
      cursor: grab;
      transition: background 0.15s;
      min-height: 30px;
    }

    .sb-thumb:hover {
      background: #7a5ea8;
    }

    .sb-thumb:active {
      cursor: grabbing;
    }

    /* single card */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .card-wrap {
      display: flex;
      flex-direction: column;
    }

    .scallop-card {
      background: #d4b8d8;
      border-radius: 8px 8px 0 0;
      padding: 12px 14px 14px;
      border: 1.5px solid #c0a0c8;
      border-bottom: none;
    }

    .scallop-bottom {
      height: 20px;
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .scallop-bottom svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .card-pin {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid #a880b8;
      background: white;
      margin-bottom: 10px;
    }

    /* product image */
    .card-img {
      width: 100%;
      height: 160px;
      background: #ecdaf2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-img-placeholder {
      font-size: 36px;
      color: #c8a0d8;
    }

    /* product title */
    .card-title {
      font-size: 15px;
      color: #5a3060;
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    /* divider line */
    .card-divider {
      height: 1.5px;
      background: #b898c0;
      opacity: 0.5;
      border-radius: 1px;
      margin-bottom: 10px;
    }

    /* store rows */
    .store-list-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .store-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #c8a8d0;
    }

    .store-row:last-child {
      border-bottom: none;
    }

    .store-name {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #5a3060;
      text-decoration: none;
      font-weight: 400;
    }

    .store-name:hover {
      text-decoration: underline;
      color: #9060a0;
    }

    .store-name.no-link {
      color: #b0a0b0;
      cursor: default;
    }

    .store-price {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #7a3070;
    }

    .store-price.not-found {
      color: #b0a0b0;
      font-size: 12px;
    }

    /* stickers */
    .sticker {
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }

    .loading-text {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: #9a6080;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .error-msg {
      text-align: center;
      padding: 30px 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: #c07080;
      display: none;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <span class="topbar-title">daam.com</span>
      <div class="win-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
    </div>

    <div class="searchbar">
      <input type="text" id="searchInput" placeholder="search a product..." />
      <button onclick="doSearch()" aria-label="Search">&#128269;</button>
    </div>

    <div class="result-label" id="resultLabel"></div>

    <!--
      ================================
      STICKERS — PAGE 2
      ================================
      <img src="{% static 'yourimage.png' %}" class="sticker" style="
        top/bottom, left/right, width, transform:rotate(Xdeg), z-index:4
      ">
 
      SUGGESTED SPOTS:
      top-right   → style="top:70px;  right:8px;   width:60px; transform:rotate(15deg);  z-index:4;"
      mid-right   → style="top:320px; right:6px;   width:65px; transform:rotate(-8deg);  z-index:4;"
      bottom-right→ style="bottom:50px;right:8px;  width:60px; transform:rotate(5deg);   z-index:4;"
      bottom-left → style="bottom:80px;left:8px;   width:50px;                           z-index:4;"
      mid-left    → style="top:420px; left:4px;    width:55px; transform:rotate(-12deg); z-index:4;"
      ================================
    -->

    <!-- STICKER SLOT 1 — top right -->
    <!-- <img src="{% static 'lip.png' %}" class="sticker" style="top:70px;right:8px;width:60px;transform:rotate(15deg);z-index:4;"> -->

    <!-- STICKER SLOT 2 — mid right -->
    <img src="{% static 'lip.png' %}" class="sticker"
      style="top:300px;right:6px;width:65px;transform:rotate(-8deg);z-index:4;">

    <!-- STICKER SLOT 3 — bottom right -->
    <img src="{% static 'cream.png' %}" class="sticker"
      style="bottom:50px;right:8px;width:60px;transform:rotate(5deg);z-index:4;">

    <!-- STICKER SLOT 4 — mid left -->
    <img src="{% static 'mask.png' %}" class="sticker"
      style="top:180px;left:4px;width:55px;transform:rotate(-8deg);z-index:4;">

    <div class="loading" id="loading">
      <p class="loading-text">searching all stores...</p>
    </div>

    <div class="error-msg" id="errorMsg">
      oops! something went wrong. try again?
    </div>

    <div class="scroll-area-wrap">
      <div class="cards-scroll" id="cardsScroll">
        <div class="cards-grid" id="cardsGrid"></div>
      </div>

      <div class="custom-scrollbar">
        <div class="sb-arrow" id="sbUp">&#9650;</div>
        <div class="sb-track" id="sbTrack">
          <div class="sb-thumb" id="sbThumb"></div>
        </div>
        <div class="sb-arrow" id="sbDown">&#9660;</div>
      </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q') || '';
    const searchInput = document.getElementById('searchInput');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const cardsGrid = document.getElementById('cardsGrid');
    const resultLabel = document.getElementById('resultLabel');
    const cardsScroll = document.getElementById('cardsScroll');
    const sbThumb = document.getElementById('sbThumb');
    const sbTrack = document.getElementById('sbTrack');
    const sbUp = document.getElementById('sbUp');
    const sbDown = document.getElementById('sbDown');

    searchInput.value = query;
    if (query) {
      resultLabel.textContent = `results for: "${query}"`;
      fetchResults(query);
    }

    function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      window.location.href = `/results/?q=${encodeURIComponent(q)}`;
    }

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    // scrollbar
    function updateScrollbar() {
      const el = cardsScroll;
      const scrollable = el.scrollHeight - el.clientHeight;
      if (scrollable <= 0) {
        sbThumb.style.height = '100%';
        sbThumb.style.top = '0px';
        return;
      }
      const trackH = sbTrack.clientHeight;
      const thumbH = Math.max(30, (el.clientHeight / el.scrollHeight) * trackH);
      const thumbTop = (el.scrollTop / scrollable) * (trackH - thumbH);
      sbThumb.style.height = thumbH + 'px';
      sbThumb.style.top = thumbTop + 'px';
    }

    cardsScroll.addEventListener('scroll', updateScrollbar);
    sbUp.addEventListener('click', () => cardsScroll.scrollBy({ top: -140, behavior: 'smooth' }));
    sbDown.addEventListener('click', () => cardsScroll.scrollBy({ top: 140, behavior: 'smooth' }));

    let dragging = false, dragStartY = 0, dragStartScroll = 0;

    sbThumb.addEventListener('mousedown', e => {
      dragging = true;
      dragStartY = e.clientY;
      dragStartScroll = cardsScroll.scrollTop;
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const trackH = sbTrack.clientHeight;
      const thumbH = sbThumb.clientHeight;
      const scrollable = cardsScroll.scrollHeight - cardsScroll.clientHeight;
      const ratio = scrollable / (trackH - thumbH);
      cardsScroll.scrollTop = dragStartScroll + (e.clientY - dragStartY) * ratio;
    });

    document.addEventListener('mouseup', () => { dragging = false; });

    sbTrack.addEventListener('click', e => {
      if (e.target === sbThumb) return;
      const rect = sbTrack.getBoundingClientRect();
      const ratio = (e.clientY - rect.top) / sbTrack.clientHeight;
      const scrollable = cardsScroll.scrollHeight - cardsScroll.clientHeight;
      cardsScroll.scrollTop = ratio * scrollable;
    });

    // fetch from django
    function fetchResults(q) {
      loading.style.display = 'block';
      errorMsg.style.display = 'none';

      fetch(`/api/search/?q=${encodeURIComponent(q)}`)
        .then(res => { if (!res.ok) throw new Error('bad'); return res.json(); })
        .then(data => { loading.style.display = 'none'; renderCards(data); })
        .catch(() => { loading.style.display = 'none'; errorMsg.style.display = 'block'; });
    }

    function scallopSVG() {
      return `<svg viewBox="0 0 200 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0 Q10 20 20 0 Q30 20 40 0 Q50 20 60 0 Q70 20 80 0 Q90 20 100 0 Q110 20 120 0 Q130 20 140 0 Q150 20 160 0 Q170 20 180 0 Q190 20 200 0 L200 20 L0 20 Z" fill="#d4b8d8"/>
        <path d="M0 0 Q10 18 20 0 Q30 18 40 0 Q50 18 60 0 Q70 18 80 0 Q90 18 100 0 Q110 18 120 0 Q130 18 140 0 Q150 18 160 0 Q170 18 180 0 Q190 18 200 0" fill="none" stroke="#e8d8b0" stroke-width="2"/>
      </svg>`;
    }

    // build single card with all store rows
    function renderCards(data) {
      cardsGrid.innerHTML = '';

      const storeRows = data.results.map(item => {
        if (!item.found) {
          return `
            <div class="store-row">
              <span class="store-name no-link">${item.store}</span>
              <span class="store-name product-unavilable">not found</span>
            </div>`;
        }
        return `
          <div class="store-row">
            <a class="store-name" href="${item.link}" target="_blank">${item.store}</a>
            <span class="store-price">${item.price || 'see site'}</span>
          </div>`;
      }).join('');

      const imgHtml = data.image
        ? `<img src="${data.image}" alt="${data.title || ''}">`
        : `<span class="card-img-placeholder">&#128247;</span>`;

      const card = document.createElement('div');
      card.className = 'card-wrap';
      card.innerHTML = `
        <div class="scallop-card">
          <div class="card-pin"></div>
          <div class="card-img">${imgHtml}</div>
          <p class="card-title">${data.title || data.product}</p>
          <div class="card-divider"></div>
          <div class="store-list-wrap">${storeRows}</div>
        </div>
        <div class="scallop-bottom">${scallopSVG()}</div>
      `;

      cardsGrid.appendChild(card);
      setTimeout(updateScrollbar, 50);
    }
  </script>
</body>

</html>
